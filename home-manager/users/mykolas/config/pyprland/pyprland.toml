[pyprland]
plugins = [
  "scratchpads",
  "wallpapers",
  "expose",
  "shortcuts_menu",
  "toggle_special"
]

[expose]
include_special = true

[wallpapers]
path = "~/.config/wallpapers/" # path to the folder with background images
extentions = ["png", "jpg", "jpeg", "webp"]
unique = true # set a different wallpaper for each screen
interval = 15
command = 'swww img --transition-type any "[file]"'
clear_command = "swww clear"

[scratchpads.term]
animation = "fromTop"
command = "kitty --class kitty-dropterm"
class = "kitty-dropterm"
# command = "ghostty --class=com.mitchellh.ghostty.dropdown"
# class = "com.mitchellh.ghostty.dropdown"
size = "85% 75%"
max_size = "2400px 100%"
margin = 50
allow_special_workspaces = true
multi = false

[scratchpads.volume]
animation = "fromTop"
command = "pwvucontrol"
class = "com.saivert.pwvucontrol"
size = "33% 50%"
unfocus = "hide"
lazy = true
allow_special_workspaces = true

[shortcuts_menu.entries.Screenshots]
"Area to clipboard" = "grimblast -t png copysave area"
"Full screen" = "grimblast -t png copysave screen"
"Active window" = "grimblast -t png copysave active"
"Area (3s delay)" = "grimblast -w 3 -t png copysave area"
"Edit area" = "grimblast -t png edit area"

[shortcuts_menu.entries.Session]
"Lock screen" = "loginctl lock-session"
"Logout" = "uwsm stop"

[shortcuts_menu.entries.Utilities]
"Clipboard history" = "kitty --class clipse -e clipse"
"Volume control" = "pypr toggle volume"
"File manager" = "uwsm app -- kitty -e yazi"
"Wallpaper cycle" = "pypr wall next"


